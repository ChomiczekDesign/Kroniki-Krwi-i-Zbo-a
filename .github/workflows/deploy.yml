name: Deploy wiki

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Kiln
        run: |
          curl -L https://github.com/otaleghani/kiln/releases/latest/download/kiln_linux_amd64 -o kiln
          chmod +x kiln

      - name: Process dice tags
        run: |
          python3 .github/workflows/replace_dice_tags.py

      - name: Build site
        run: |
          ./kiln generate \
            --input ./wiki_build \
            --output ./public \
            --disable-local-graph

      - name: Add custom paragraph CSS
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          CUSTOM_STYLE = """
          <style id="custom-justify-css">
            html[lang="pl"] p,
            body p,
            main p,
            article p,
            section p,
            .content p,
            .page-content p,
            .note-content p,
            .markdown p,
            .markdown-body p,
            .markdown-rendered p,
            .markdown-preview-view p,
            [class*="content"] p {
              text-align: justify !important;
              text-align-last: auto !important;
              hyphens: auto !important;
              -webkit-hyphens: auto !important;
              overflow-wrap: break-word !important;
              word-break: normal !important;
            }
          </style>
          """

          for path in Path("./public").rglob("*.html"):
              html = path.read_text(encoding="utf-8")

              # Ustaw lang="pl" dla poprawnego hyphenation
              if "<html" in html:
                  first_tag = html.split(">", 1)[0]
                  if "lang=" not in first_tag:
                      html = html.replace("<html", '<html lang="pl"', 1)

              # Usuń stare wersje custom CSS/linków, żeby nie mieszały
              html = html.replace('<link rel="stylesheet" href="custom.css">\n', "")
              html = html.replace('<link rel="stylesheet" href="/custom.css">\n', "")

              html = re.sub(
                  r'\s*<style id="custom-justify-css">.*?</style>',
                  '',
                  html,
                  flags=re.DOTALL
              )

              # Wstrzyknij styl jak najpóźniej, przed </body>
              if "</body>" in html:
                  html = html.replace("</body>", CUSTOM_STYLE + "\n</body>", 1)
              else:
                  html += CUSTOM_STYLE

              path.write_text(html, encoding="utf-8")
          PY
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

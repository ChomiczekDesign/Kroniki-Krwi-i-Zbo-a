name: Deploy wiki

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Kiln
        run: |
          curl -L https://github.com/otaleghani/kiln/releases/latest/download/kiln_linux_amd64 -o kiln
          chmod +x kiln

      - name: Process dice tags
        run: |
          python3 .github/workflows/replace_dice_tags.py

      - name: Build site
        run: |
          ./kiln generate \
            --input ./wiki_build \
            --output ./public \
            --disable-local-graph

            - name: Add custom paragraph CSS
        run: |
          cat > ./public/custom.css <<'EOF'
          p {
            text-align: justify !important;
            text-align-last: auto;
            hyphens: auto;
            -webkit-hyphens: auto;
            overflow-wrap: break-word;
            word-break: normal;
          }
          EOF

          python3 <<'PY'
          from pathlib import Path

          for path in Path("./public").rglob("*.html"):
              html = path.read_text(encoding="utf-8")

              if "<html" in html and "lang=" not in html.split(">", 1)[0]:
                  html = html.replace("<html", '<html lang="pl"', 1)

              if "custom.css" not in html:
                  html = html.replace(
                      "</head>",
                      '<link rel="stylesheet" href="custom.css">\n</head>',
                      1
                  )

              path.write_text(html, encoding="utf-8")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

name: Deploy wiki

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

     

      - name: Process dice tags
        run: |
          python3 .github/workflows/replace_dice_tags.py

      - name: Build site
        run: |
          ./kiln generate \
            --input ./wiki_build \
            --output ./public \
            --disable-local-graph

      - name: Add custom paragraph CSS
        run: |
          cat > ./public/custom.css <<'EOF'
          article p,
          main p,
          .markdown-preview-view p,
          .markdown-rendered p {
            text-align: justify;
            hyphens: auto;
            overflow-wrap: break-word;
            word-break: normal;
          }
          EOF

          find ./public -name "*.html" -type f -exec sed -i 's#</head>#<link rel="stylesheet" href="/custom.css">\n</head>#' {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
